name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPO: giga-mcp-server

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:latest .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "image=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT
        id: build

      - name: Wait for App Runner deployments
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SERVICES=$(aws apprunner list-services \
            --query "ServiceSummaryList[?starts_with(ServiceName, 'giga-mcp-')].ServiceArn" \
            --output text --region $AWS_REGION)

          if [ -z "$SERVICES" ]; then
            echo "No giga-mcp-* App Runner services found — skipping deployment wait"
            exit 0
          fi

          echo "Waiting for auto-deployment on services:"
          for ARN in $SERVICES; do
            NAME=$(aws apprunner describe-service --service-arn "$ARN" \
              --query 'Service.ServiceName' --output text --region $AWS_REGION)
            echo "  $NAME"
          done

          # Poll until all services are running (not deploying)
          TIMEOUT=600
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            ALL_RUNNING=true
            for ARN in $SERVICES; do
              STATUS=$(aws apprunner describe-service --service-arn "$ARN" \
                --query 'Service.Status' --output text --region $AWS_REGION)
              if [ "$STATUS" != "RUNNING" ]; then
                ALL_RUNNING=false
              fi
            done
            if $ALL_RUNNING; then
              echo "All services running."
              break
            fi
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done

          if ! $ALL_RUNNING; then
            echo "::warning::Timed out waiting for deployments — check App Runner console"
          fi

      - name: Deployment summary
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "### Deployed :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Services:**" >> $GITHUB_STEP_SUMMARY
          aws apprunner list-services \
            --query "ServiceSummaryList[?starts_with(ServiceName, 'giga-mcp-')].[ServiceName,ServiceUrl]" \
            --output text --region $AWS_REGION | while read NAME URL; do
            echo "- $NAME: https://$URL" >> $GITHUB_STEP_SUMMARY
          done
