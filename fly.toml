app = "giga-mcp-server"
primary_region = "ord"

[build]

[env]
  GIGA_TRANSPORT = "streamable-http"
  GIGA_HOST = "0.0.0.0"
  GIGA_PORT = "8000"
  GIGA_WHATSAPP_DB_PATH = "/app/store/messages.db"
  GIGA_WHATSAPP_BRIDGE_URL = "http://localhost:8080"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "whatsapp_store"
  destination = "/app/store"
